---
name: macOS

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    name: ${{matrix.buildname}}
    runs-on: ${{matrix.os}}
    strategy:
      # Avoid canceling all jobs on transient failures.
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            buildname: macOS old
            bundle_suffix: '-macos-x86_64_macOS12'
            cmake_preset: macOS-10

          - os: macos-15-intel
            buildname: macOS x86_64
            bundle_suffix: '-macos-x86_64'
            cmake_preset: macOS-13

          - os: macos-14
            buildname: macOS arm64
            bundle_suffix: '-macos-arm64'
            cmake_preset: macOS-12-m1

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          submodules: false
          # Full commit history needed for sortable version string (git describe in CMake).
          # Blobless filter skips file content for historical commits to speed up clone.
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - name: Enable ccache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce # v1.2.22
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          max-size: 1G

      - name: Set up ccache
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"

      - name: Download qtbase bottle
        if: matrix.buildname == 'macOS old'
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: ${{ github.repository_owner }}/brew_qt_macos12
          version: tags/nightly
          regex: true
          file: "qtbase--.*\\.bottle\\.tar\\.gz"
          target: "./"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        env:
          BUILDNAME: ${{ matrix.buildname }}
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: '${{github.workspace}}/utils/github/install-macos.sh'

      - name: Download miniaudio
        uses: ./.github/actions/download-miniaudio

      - name: Build with CMake
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10
        with:
          configurePreset: '${{ matrix.cmake_preset }}'
          buildPreset: '${{ matrix.cmake_preset }}'
          packagePreset: '${{ matrix.cmake_preset }}'

      - name: Create gnupg directory for tests
        run: mkdir -p ~/.gnupg && chmod go-rwx ~/.gnupg

      - name: Get version string
        id: version
        uses: ./.github/actions/get-version
        with:
          build_dir: ${{ github.workspace }}/build/copyq/${{ matrix.cmake_preset }}

      - name: Create macOS bundle
        working-directory: '${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}'
        # Retry cpack due to frequent errors: "hdiutil: create failed - Resource busy"
        run: (cpack || cpack || cpack) && mv -v copyq-*.dmg "CopyQ-${APP_VERSION}${BUNDLE_SUFFIX}.dmg"
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUNDLE_SUFFIX: ${{ matrix.bundle_suffix }}

      - name: Upload macOS bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: 'CopyQ-${{ steps.version.outputs.version }}${{ matrix.bundle_suffix }}.dmg'
          path: '${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}/CopyQ-${{ steps.version.outputs.version }}${{ matrix.bundle_suffix }}.dmg'
          archive: false

      - name: Test
        working-directory: '${{github.workspace}}/build/copyq/${{ matrix.cmake_preset }}'
        run: '${{github.workspace}}/utils/github/test-macos.sh'

      - name: Upload crash reports
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: 'crash-reports${{ matrix.bundle_suffix }}'
          path: '~/Library/Logs/DiagnosticReports/*'
          if-no-files-found: ignore
